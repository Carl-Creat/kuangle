<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 旷了吗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
        .gradient-hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="text-5xl mb-2">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">登录旷了吗</h1>
            <p class="text-gray-500 text-sm mt-1">开始今天的签到</p>
        </div>

        <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

        <form id="loginForm" class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="输入用户名">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="输入密码">
            </div>
            <button type="submit"
                class="btn-primary w-full text-white font-bold py-3 rounded-xl hover:opacity-90 transition">
                登录
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-4">
            还没有账号？<a href="/register" class="text-purple-600 font-medium hover:underline">立即注册</a>
        </p>
        <p class="text-center mt-2">
            <a href="/" class="text-gray-400 text-sm hover:underline">返回首页</a>
        </p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const msg = document.getElementById('msg');
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.textContent = '登录中...';

        try {
            const fd = new FormData(form);
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(Object.fromEntries(fd))
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                msg.className = 'mb-4 p-3 rounded-lg text-sm text-center bg-red-50 text-red-600';
                msg.textContent = data.message;
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        } catch (err) {
            msg.className = 'mb-4 p-3 rounded-lg text-sm text-center bg-red-50 text-red-600';
            msg.textContent = '网络错误，请重试';
            msg.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = '登录';
        }
    });
    </script>
</body>
</html>
