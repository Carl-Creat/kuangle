<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 旷了吗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; }
        .gradient-hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .role-card { transition: all 0.2s; cursor: pointer; }
        .role-card.selected { border-color: #667eea; background: #f5f3ff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-sm">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">注册旷了吗</h1>
            <p class="text-gray-500 text-sm mt-1">选择你的身份，开始使用</p>
        </div>

        <div id="msg" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

        <form id="regForm" class="bg-white rounded-2xl shadow-lg p-6 space-y-4">
            <!-- 角色选择 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">我是一名</label>
                <div class="grid grid-cols-2 gap-3">
                    <div class="role-card border-2 border-gray-200 rounded-xl p-4 text-center selected" onclick="selectRole('student', this)">
                        <div class="text-2xl mb-1">🎓</div>
                        <div class="text-sm font-medium text-gray-800">学生</div>
                        <div class="text-xs text-gray-400 mt-1">我需要签到报平安</div>
                    </div>
                    <div class="role-card border-2 border-gray-200 rounded-xl p-4 text-center" onclick="selectRole('guardian', this)">
                        <div class="text-2xl mb-1">👨‍👩‍👧</div>
                        <div class="text-sm font-medium text-gray-800">家长</div>
                        <div class="text-xs text-gray-400 mt-1">我需要监护孩子出勤</div>
                    </div>
                </div>
                <input type="hidden" name="role" id="roleInput" value="student">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" required minlength="3"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="3-20个字符">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="用于接收通知">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" required minlength="6"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="至少6个字符">
            </div>

            <button type="submit"
                class="btn-primary w-full text-white font-bold py-3 rounded-xl hover:opacity-90 transition">
                创建账号
            </button>
        </form>

        <p class="text-center text-gray-500 text-sm mt-4">
            已有账号？<a href="/login" class="text-purple-600 font-medium hover:underline">立即登录</a>
        </p>
        <p class="text-center mt-2">
            <a href="/" class="text-gray-400 text-sm hover:underline">返回首页</a>
        </p>
    </div>

    <script>
    function selectRole(role, el) {
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('roleInput').value = role;
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const msg = document.getElementById('msg');
        const btn = form.querySelector('button');
        btn.disabled = true;
        btn.textContent = '注册中...';

        try {
            const fd = new FormData(form);
            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(Object.fromEntries(fd))
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                msg.className = 'mb-4 p-3 rounded-lg text-sm text-center bg-red-50 text-red-600';
                msg.textContent = data.message;
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = '创建账号';
            }
        } catch (err) {
            msg.className = 'mb-4 p-3 rounded-lg text-sm text-center bg-red-50 text-red-600';
            msg.textContent = '网络错误，请重试';
            msg.classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = '创建账号';
        }
    });
    </script>
</body>
</html>
